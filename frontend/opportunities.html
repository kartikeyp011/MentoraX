<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportunities - MentoraX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #c7d2fe;
            --secondary: #7c3aed;
            --accent: #0ea5e9;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --dark-bg: #111827;
            --dark-card: #1f2937;
            --dark-card-hover: #374151;
            --text-primary: #f9fafb;
            --text-secondary: #d1d5db;
            --text-muted: #9ca3af;
            --border-color: #374151;
        }

        @keyframes fadeInUp {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        @keyframes slideInLeft {
            from { 
                transform: translateX(-20px); 
                opacity: 0; 
            }
            to { 
                transform: translateX(0); 
                opacity: 1; 
            }
        }

        @keyframes pulse {
            0%, 100% { 
                transform: scale(1); 
            }
            50% { 
                transform: scale(1.05); 
            }
        }

        @keyframes glow {
            0%, 100% { 
                box-shadow: 0 0 5px rgba(79, 70, 229, 0.4); 
            }
            50% { 
                box-shadow: 0 0 20px rgba(79, 70, 229, 0.7); 
            }
        }

        @keyframes shimmer {
            0% { 
                background-position: -200% 0; 
            }
            100% { 
                background-position: 200% 0; 
            }
        }

        .animate-fadeInUp {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .animate-slideInLeft {
            animation: slideInLeft 0.5s ease-out forwards;
        }

        .animate-pulse-slow {
            animation: pulse 3s infinite ease-in-out;
        }

        .animate-glow {
            animation: glow 2s infinite ease-in-out;
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border-color);
        }

        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        .sidebar-item {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .sidebar-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--primary);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .sidebar-item:hover::before,
        .sidebar-item.active::before {
            transform: scaleY(1);
        }

        .sidebar-item.active {
            background: rgba(79, 70, 229, 0.1);
            border-left: 4px solid var(--primary);
        }

        .loading-shimmer {
            background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-card {
            position: relative;
            overflow: hidden;
        }

        .stats-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .stats-card:hover::before {
            transform: scaleX(1);
        }

        .heading-1 {
            font-size: 2.25rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .heading-2 {
            font-size: 1.875rem;
            font-weight: 700;
            line-height: 1.3;
        }

        .heading-3 {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .navbar {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--dark-card);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--dark-card-hover);
        }

        button:focus, a:focus {
            outline: 2px solid var(--primary-light);
            outline-offset: 2px;
        }

        @media (max-width: 768px) {
            .heading-1 {
                font-size: 1.875rem;
            }

            .heading-2 {
                font-size: 1.5rem;
            }
        }

        .opportunity-item {
            background: #0f172a !important;
            border: 2px solid #334155 !important;
            border-radius: 1rem !important;
            padding: 1.5rem !important;
            margin-bottom: 1.25rem !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            position: relative;
            overflow: hidden;
        }

        .opportunity-item:hover {
            background: #1e293b !important;
            border-color: #4f46e5 !important;
            transform: translateY(-4px) !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5),
                        0 10px 10px -5px rgba(0, 0, 0, 0.2) !important;
        }

        .opportunity-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #4f46e5, #7c3aed);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .opportunity-item:hover::before {
            opacity: 1;
        }

        .skill-tag {
            background: linear-gradient(135deg, #4f46e5, #7c3aed) !important;
            color: white !important;
            padding: 0.5rem 1rem !important;
            border-radius: 2rem !important;
            font-size: 0.8rem !important;
            font-weight: 600 !important;
            border: none !important;
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.3);
            transition: all 0.2s ease;
        }

        .skill-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(79, 70, 229, 0.4);
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">
    <nav class="navbar bg-gray-800/90 sticky top-0 z-50 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-2">
                    <div class="bg-gradient-to-r from-indigo-500 to-purple-600 rounded-lg p-2">
                        <span class="text-white text-xl">🚀</span>
                    </div>
                    <h1 class="text-2xl font-bold gradient-text">MentoraX</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="userName" class="text-gray-300 font-medium"></span>
                    <button onclick="logoutUser()" class="btn-primary px-4 py-2 rounded-lg text-sm font-medium transition-all duration-300 flex items-center">
                        <span class="mr-2">🚪</span>
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex">
        <div class="w-64 sidebar-container bg-gray-800/80 shadow-xl border-r border-gray-700 fixed top-16 h-[calc(100vh-4rem)] overflow-y-auto">
            <div class="p-6">
                <nav class="space-y-2">
                    <a href="/dashboard" class="flex items-center px-4 py-3 text-gray-300 hover:text-white rounded-lg sidebar-item">
                        <span class="text-xl mr-3">📊</span>
                        <span class="font-medium">Dashboard</span>
                    </a>
                    <a href="/career-guidance" class="flex items-center px-4 py-3 text-gray-300 hover:text-white rounded-lg sidebar-item">
                        <span class="text-xl mr-3">🎯</span>
                        <span class="font-medium">Career Guidance</span>
                    </a>
                    <a href="/opportunities" class="flex items-center px-4 py-3 text-blue-400 rounded-lg sidebar-item active">
                        <span class="text-xl mr-3">💼</span>
                        <span class="font-medium">Opportunities</span>
                    </a>
                    <a href="/learning-zone" class="flex items-center px-4 py-3 text-gray-300 hover:text-white rounded-lg sidebar-item">
                        <span class="text-xl mr-3">📚</span>
                        <span class="font-medium">Learning Zone</span>
                    </a>
                    <a href="/upskill-coach" class="flex items-center px-4 py-3 text-gray-300 hover:text-white rounded-lg sidebar-item">
                        <span class="text-xl mr-3">🤖</span>
                        <span class="font-medium">Upskill Coach</span>
                    </a>
                    <a href="/profile" class="flex items-center px-4 py-3 text-gray-300 hover:text-white rounded-lg sidebar-item">
                        <span class="text-xl mr-3">👤</span>
                        <span class="font-medium">Profile</span>
                    </a>
                </nav>
            </div>
        </div>

        <div class="flex-1 p-6 md:p-8 ml-64">
            <div class="mb-8 animate-fadeInUp">
                <h2 class="heading-1 text-white mb-2">Opportunities Hub</h2>
                <p class="text-gray-400 text-lg">Discover internships, jobs, and more</p>
            </div>

            <div class="bg-gray-800 rounded-xl shadow-lg p-6 mb-6 animate-fadeInUp">
                <div class="flex space-x-4 border-b border-gray-700 pb-4">
                    <button onclick="changeTab('all')" id="tabAll" class="px-4 py-2 font-medium text-blue-400 border-b-2 border-blue-400">
                        All Opportunities
                    </button>
                    <button onclick="changeTab('saved')" id="tabSaved" class="px-4 py-2 font-medium text-gray-400 hover:text-blue-400">
                        Saved (<span id="savedCount">0</span>)
                    </button>
                </div>
            </div>

            <div id="filtersSection" class="bg-gray-800 rounded-xl shadow-lg p-6 mb-6 animate-fadeInUp">
                <h3 class="heading-3 text-white mb-4">Filters</h3>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Location</label>
                        <select id="locationFilter" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
                            <option value="">All Locations</option>
                            <option value="Remote">Remote</option>
                            <option value="Bangalore">Bangalore</option>
                            <option value="Mumbai">Mumbai</option>
                            <option value="Delhi">Delhi</option>
                            <option value="Hyderabad">Hyderabad</option>
                            <option value="Pune">Pune</option>
                            <option value="Chennai">Chennai</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Source</label>
                        <select id="sourceFilter" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
                            <option value="">All Sources</option>
                            <option value="Internshala">Internshala</option>
                            <option value="AngelList">AngelList</option>
                            <option value="LinkedIn">LinkedIn</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Search</label>
                        <input type="text" id="searchInput" placeholder="Search opportunities..."
                               class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-gray-400">
                    </div>
                </div>

                <div class="mt-4 flex space-x-3">
                    <button onclick="applyFilters()" class="btn-primary px-6 py-2 rounded-lg">
                        Apply Filters
                    </button>
                    <button onclick="clearFilters()" class="bg-gray-700 text-gray-300 px-6 py-2 rounded-lg hover:bg-gray-600">
                        Clear
                    </button>
                </div>
            </div>

            <div class="bg-blue-500/20 rounded-xl p-4 mb-6 border border-blue-500/30">
                <p class="text-sm text-gray-300">
                    Showing <span id="oppCount" class="font-bold text-blue-400">0</span> opportunities
                </p>
            </div>

            <div id="loadingState" class="text-center py-12">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                <p class="text-gray-400 mt-4">Loading opportunities...</p>
            </div>

            <div id="emptyState" class="hidden text-center py-12">
                <span class="text-6xl">🔍</span>
                <p class="text-gray-300 mt-4 text-lg">No opportunities found</p>
                <p class="text-gray-500 text-sm mt-2">Try adjusting your filters</p>
            </div>

            <div id="opportunitiesGrid" class="hidden space-y-4">
            </div>
        </div>
    </div>

    <script src="/static/js/config.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/opportunities.js"></script>
</body>
</html>
